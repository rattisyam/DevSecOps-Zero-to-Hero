name: Terraform Deployment

on:
push:
branches:
- main
workflow_dispatch:

permissions:
id-token: write
contents: read

jobs:
deploy:

runs-on: ubuntu-latest

defaults:
  run:
    working-directory: ./terraform

steps:

  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Fetch Azure Credentials from Vault
    uses: hashicorp/vault-action@v3
    with:
      url: http://40.80.91.125/:8200
      role: gh-actions-role
      method: jwt
      secrets: |
        azure/creds/storage-role client_id | ARM_CLIENT_ID ;
        azure/creds/storage-role client_secret | ARM_CLIENT_SECRET ;
        azure/creds/storage-role tenant_id | ARM_TENANT_ID ;
        azure/creds/storage-role subscription_id | ARM_SUBSCRIPTION_ID

  - name: Azure Login
    uses: azure/login@v2
    with:
      client-id: ${{ env.ARM_CLIENT_ID }}
      tenant-id: ${{ env.ARM_TENANT_ID }}
      client-secret: ${{ env.ARM_CLIENT_SECRET }}
      subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

  - name: Setup Terraform
    uses: hashicorp/setup-terraform@v3

  - name: Terraform Init
    run: terraform init

  - name: Terraform Validate
    run: terraform validate

  - name: Terraform Plan
    run: terraform plan

  - name: Terraform Apply
    run: terraform apply -auto-approve
```
